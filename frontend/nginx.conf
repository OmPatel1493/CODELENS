server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Cache hashed assets aggressively; they're content-addressed by Vite.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: unknown paths serve index.html so React Router can handle them.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
