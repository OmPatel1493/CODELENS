# Local full-stack run: Postgres + FastAPI backend + React frontend (nginx).
# Mirrors the production topology: Postgres (not SQLite) and the slim backend
# image using EMBEDDING_BACKEND=api. Object storage stays local here; prod uses S3.
#
#   HF_API_TOKEN=hf_xxx docker compose up --build
#   frontend → http://localhost:5173   |   API → http://localhost:8000/docs
#
# Set HF_API_TOKEN (free: huggingface.co/settings/tokens) so embeddings work — the
# image is intentionally torch-free. To embed on-box instead, run the backend
# outside Docker with `uv run --extra local uvicorn app.main:app` and set
# EMBEDDING_BACKEND=local.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: codelens
      POSTGRES_PASSWORD: codelens
      POSTGRES_DB: codelens
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codelens"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://codelens:codelens@db:5432/codelens
      JWT_SECRET_KEY: local-dev-secret-change-me-in-production-please
      CORS_ORIGINS: '["http://localhost:5173"]'
      STORAGE_BACKEND: local
      EMBEDDING_BACKEND: api
      HF_API_TOKEN: ${HF_API_TOKEN:-}
    ports:
      - "8000:8000"
    volumes:
      - storagedata:/app/data

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000/api
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  pgdata:
  storagedata:
